<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MENU -->
  <div id="menu" class="screen active">
    <h1>Mini Click Game</h1>
    <button onclick="showLevels()">Start</button>
  </div>

  <!-- LEVEL SELECT -->
  <div id="levels" class="screen">
    <h2>Select Level</h2>
    <button onclick="startGame(1)">Level 1</button>
    <button onclick="startGame(2)">Level 2</button>
    <button onclick="goMenu()">Back</button>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <h2 id="levelText"></h2>
    <p>Score: <span id="score">0</span></p>
    <div id="gameBox">
      <div id="target" onclick="hit()"></div>
    </div>
    <br>
    <button onclick="goMenu()">Quit</button>
  </div>

<script>
let score = 0;
let speed = 1000;
let gameInterval;

function showLevels() {
  switchScreen('levels');
}

function goMenu() {
  clearInterval(gameInterval);
  switchScreen('menu');
}

function startGame(level) {
  score = 0;
  document.getElementById('score').innerText = score;

  if (level === 1) speed = 1000;
  if (level === 2) speed = 600;

  document.getElementById('levelText').innerText = 'Level ' + level;

  switchScreen('game');
  moveTarget();
  gameInterval = setInterval(moveTarget, speed);
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function moveTarget() {
  const box = document.getElementById('gameBox');
  const target = document.getElementById('target');

  const x = Math.random() * (box.clientWidth - 40);
  const y = Math.random() * (box.clientHeight - 40);

  target.style.left = x + 'px';
  target.style.top = y + 'px';
}

function hit() {
  score++;
  document.getElementById('score').innerText = score;
}
</script>

</body>
</html>
