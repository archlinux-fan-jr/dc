<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donkey Clicker 🫏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

	<button id="themeToggle" onclick="toggleTheme()">🌙</button>
	<button id="resetBtn" onclick="resetGame()">Reset</button>

	<div class="layout">

		<div class="left">
		  <h1>Donkey Clicker 🫏</h1>

		  <div class="donkey-wrapper">
		    <img src="pics/donkey.png" id="donkey" onclick="clickDonkey()">
		    <div id="floating"></div>
		  </div>

		  <h2 id="clicks">0</h2>
		  <p>Manual: <span id="perClick">1</span></p>
		  <p>Auto: <span id="cps">0</span>/s</p>
		</div>

		<div class="right">
		  <h2>Auto Farmers</h2>
		  <div id="autoShop"></div>

		  <h2>Upgrades</h2>
		  <div id="upgradeShop"></div>
		</div>

	</div>

	<footer>made by kris</footer>

	<script src="script.js"></script>
</body>
</html>
